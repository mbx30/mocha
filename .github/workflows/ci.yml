name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: npm ci
        run: npm ci

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: ESLint check
        run: npx eslint .

      - name: Build frontend
        run: npm run build

      - name: Upload built frontend
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  rust:
    runs-on: ${{ matrix.os }}
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Download built frontend
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Linux Tauri system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            pkg-config \
            build-essential

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          xcode-select --install || true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: npm ci
        run: npm ci

      - name: cargo check
        run: cargo check
        working-directory: src-tauri

      - name: cargo clippy
        # Don't use -D warnings: 89 lint warnings exist from inherited code
        # (too_many_arguments, type_complexity, etc.). Track in v2 polish.
        run: cargo clippy --lib --bins
        working-directory: src-tauri

      - name: cargo test
        run: cargo test
        working-directory: src-tauri

      - name: cargo fmt --check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Build Tauri (verify compile only)
        run: npx --yes @tauri-apps/cli build --no-bundle
        working-directory: src-tauri

