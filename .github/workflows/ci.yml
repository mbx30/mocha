name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  mint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc -b --noEmit
      - run: npm run build
      - run: npm test

  mint-rust:
    runs-on: windows-latest
    needs: mint-frontend
    defaults:
      run:
        working-directory: mint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dist
          path: mint/dist/
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mint/src-tauri
      - run: npm ci
        working-directory: mint
      - run: npm run build
        working-directory: mint
      - run: cargo check
        working-directory: mint/src-tauri
      - run: cargo test
        working-directory: mint/src-tauri

  stirling-preflight-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Run PreflightControllerTest
        working-directory: stirling
        run: ./gradlew :stirling-pdf:test --tests "stirling.software.SPDF.controller.api.PreflightControllerTest" -x spotlessCheck

  integration-smoke:
    runs-on: ubuntu-latest
    needs: [stirling-preflight-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build and start Stirling
        run: docker compose up -d --build
      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/api/v1/info/status; then exit 0; fi
            sleep 5
          done
          exit 1
      - name: Smoke print-preflight endpoint exists
        run: |
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/swagger-ui/index.html | grep -q 200 || true
          echo "Stirling is up on :8080"
