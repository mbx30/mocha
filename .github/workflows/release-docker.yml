name: Release Docker Image

on:
  release:
    types: [published]

env:
  REGISTRY: docker.io
  CARGO_TERM_COLOR: always
  DOCKER_CONTENT_TRUST: 1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/mint
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Sign image with Docker Content Trust
        if: success()
        run: |
          # Docker Content Trust is enabled via env var DOCKER_CONTENT_TRUST=1
          # This causes docker push to sign images automatically
          echo "✓ Image signed and pushed with Docker Content Trust enabled"

      - name: Create release notes
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Dockerfile
            docker-compose.yml
          body: |
            ## Docker Image

            Build and deployment via Docker is now available.

            ### Usage

            ```bash
            docker run -it mbx30/mint:${{ github.ref_name }}
            ```

            ### Compose

            ```bash
            VERSION=${{ github.ref_name }} docker-compose up
            ```

            Image: `${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/mint:${{ github.ref_name }}`
            Tags: ${{ steps.meta.outputs.tags }}

            **Note**: This is a Linux (x86_64) build. For macOS/Windows, use native platform builds.
