<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary); font-family:var(--font-sans); padding:22px; }
  .wrap { display:flex; flex-direction:column; gap:18px; }
  .group { display:flex; flex-direction:column; gap:9px; }
  .lab { font:var(--font-caption); font-weight:600; text-transform:uppercase; letter-spacing:var(--tracking-caps); color:var(--text-tertiary); }
  .line { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Badge, Tag, Avatar, AvatarGroup, Card } = window.MintDesignSystem_75694f;
  function Demo() {
    return (
      <div className="wrap">
        <div className="group">
          <span className="lab">Badge — job status</span>
          <div className="line">
            <Badge tone="info" dot>Queued</Badge>
            <Badge tone="brand" dot>On press</Badge>
            <Badge tone="warning" dot>Awaiting art</Badge>
            <Badge tone="success" dot>Shipped</Badge>
            <Badge tone="danger" dot>Overdue</Badge>
            <Badge tone="neutral">Draft</Badge>
          </div>
        </div>
        <div className="line" style={{gap:'40px', alignItems:'flex-start'}}>
          <div className="group">
            <span className="lab">Tag — filters</span>
            <div className="line">
              <Tag color="#863bff">Business cards</Tag>
              <Tag color="#47bfff">Banners</Tag>
              <Tag onRemove={()=>{}}>Rush only</Tag>
            </div>
          </div>
          <div className="group">
            <span className="lab">Avatar</span>
            <div className="line">
              <Avatar name="Dana Ruiz" />
              <Avatar name="Max Bowen" size="lg" />
              <AvatarGroup names={["Dana Ruiz","Max Bowen","Priya Shah","Lee Ortiz","Sam Kade"]} max={3} />
            </div>
          </div>
        </div>
        <div className="group">
          <span className="lab">Card</span>
          <div style={{maxWidth:'320px'}}>
            <Card title="Order #1042" subtitle="Acme Co · due Fri">
              <div style={{font:'var(--font-body)', color:'var(--text-secondary)'}}>500 matte business cards · 16pt</div>
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
