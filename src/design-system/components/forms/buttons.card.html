<!-- @dsCard group="Components" viewport="700x430" name="Buttons & Controls" subtitle="Button, IconButton, Switch, Checkbox — variants, sizes, states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary); font-family:var(--font-sans); padding:22px; }
  .wrap { display:flex; flex-direction:column; gap:18px; }
  .group { display:flex; flex-direction:column; gap:9px; }
  .lab { font:var(--font-caption); font-weight:600; text-transform:uppercase; letter-spacing:var(--tracking-caps); color:var(--text-tertiary); }
  .line { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .cols { display:flex; gap:40px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Switch, Checkbox } = window.MintDesignSystem_75694f;
  const Ic = ({n, size=15}) => {
    const node = window.lucide && window.lucide[n];
    if (!node) return null;
    const svg = window.lucide.createElement(node);
    svg.setAttribute('width', size); svg.setAttribute('height', size);
    return <span style={{display:'inline-flex'}} dangerouslySetInnerHTML={{__html: svg.outerHTML}} />;
  };
  function Demo() {
    return (
      <div className="wrap">
        <div className="group">
          <span className="lab">Button variants</span>
          <div className="line">
            <Button variant="primary" iconLeft={<Ic n="Plus"/>}>New order</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="subtle">Duplicate</Button>
            <Button variant="ghost">Skip</Button>
            <Button variant="danger" iconLeft={<Ic n="Trash2"/>}>Delete</Button>
          </div>
        </div>
        <div className="cols">
          <div className="group">
            <span className="lab">Sizes</span>
            <div className="line">
              <Button variant="primary" size="sm">Small</Button>
              <Button variant="primary" size="md">Medium</Button>
              <Button variant="primary" size="lg">Large</Button>
            </div>
          </div>
          <div className="group">
            <span className="lab">States</span>
            <div className="line">
              <Button variant="primary" loading>Saving</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>
        </div>
        <div className="cols">
          <div className="group">
            <span className="lab">IconButton</span>
            <div className="line">
              <IconButton icon={<Ic n="Plus" size={16}/>} label="Add" variant="primary"/>
              <IconButton icon={<Ic n="Search" size={16}/>} label="Search" variant="secondary"/>
              <IconButton icon={<Ic n="Star" size={16}/>} label="Star" variant="subtle"/>
              <IconButton icon={<Ic n="MoreHorizontal" size={16}/>} label="More" variant="ghost"/>
            </div>
          </div>
          <div className="group">
            <span className="lab">Switch &amp; Checkbox</span>
            <div className="line" style={{gap:'18px'}}>
              <Switch label="Auto-print" defaultChecked/>
              <Checkbox label="Rush job" defaultChecked/>
              <Checkbox label="Email proof"/>
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
