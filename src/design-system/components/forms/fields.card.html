<!-- @dsCard group="Components" viewport="700x300" name="Form Fields" subtitle="Input & Select — labels, icons, mono figures, focus & error" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary); font-family:var(--font-sans); padding:22px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px 20px; max-width:640px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select } = window.MintDesignSystem_75694f;
  const Ic = ({n, size=14}) => {
    const node = window.lucide && window.lucide[n]; if (!node) return null;
    const svg = window.lucide.createElement(node);
    svg.setAttribute('width', size); svg.setAttribute('height', size);
    return <span style={{display:'inline-flex'}} dangerouslySetInnerHTML={{__html: svg.outerHTML}} />;
  };
  function Demo() {
    return (
      <div className="grid">
        <Input label="Job name" placeholder="500 matte business cards" iconLeft={<Ic n="FileText"/>} />
        <Select label="Paper stock" options={['16pt Matte','14pt Gloss','100lb Uncoated']} />
        <Input label="Unit price" mono iconLeft={<Ic n="DollarSign"/>} suffix="ea" defaultValue="0.42" />
        <Select label="Status" options={[{value:'queued',label:'Queued'},{value:'press',label:'On press'},{value:'shipped',label:'Shipped'}]} />
        <Input label="Email" defaultValue="acme@billing" error="That address is already in use." />
        <Input label="Quantity" mono defaultValue="500" suffix="units" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
