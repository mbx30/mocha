<!-- @dsCard group="Type" viewport="700x170" name="Mono / Tabular Data" subtitle="Geist Mono with tabular figures for $, qty & IDs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-primary); font-family: var(--font-sans); padding: 20px 24px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 10px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; padding: 0 0 8px; }
  td { padding: 7px 0; border-top: 1px solid var(--border-subtle); font-size: 13px; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 500; }
  .right { text-align: right; }
  .pos { color: var(--success-text); }
</style>
</head>
<body>
  <table>
    <thead><tr><th>Job</th><th>Qty</th><th class="right">Unit</th><th class="right">Total</th></tr></thead>
    <tbody>
      <tr><td class="mono">J-2048</td><td class="mono">500</td><td class="mono right">$0.18</td><td class="mono right">$90.00</td></tr>
      <tr><td class="mono">J-2049</td><td class="mono">1,200</td><td class="mono right">$0.14</td><td class="mono right">$168.00</td></tr>
      <tr><td class="mono">J-2050</td><td class="mono">75</td><td class="mono right">$2.40</td><td class="mono right">$180.00</td></tr>
      <tr><td class="mono">J-2051</td><td class="mono">10,000</td><td class="mono right">$0.045</td><td class="mono right pos">$450.00</td></tr>
    </tbody>
  </table>
</body>
</html>
