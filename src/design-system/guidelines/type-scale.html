<!-- @dsCard group="Type" viewport="700x200" name="Type Scale" subtitle="Geist — display through caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-primary); font-family: var(--font-sans); padding: 22px 24px; }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 92px; flex: none; }
  .d  { font: var(--font-display); }
  .h1 { font: var(--font-h1); }
  .h2 { font: var(--font-h2); }
  .h3 { font: var(--font-h3); }
  .ti { font: var(--font-title); }
  .bd { font: var(--font-body); }
  .cap { font: var(--font-caption); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="line"><span class="meta">display · 38</span><span class="d">Run your print shop</span></div>
  <div class="line"><span class="meta">h1 · 30</span><span class="h1">Production board</span></div>
  <div class="line"><span class="meta">h2 · 24</span><span class="h2">Estimating &amp; quoting</span></div>
  <div class="line"><span class="meta">h3 · 20</span><span class="h3">Order details</span></div>
  <div class="line"><span class="meta">title · 17</span><span class="ti">Job ticket #J-2048</span></div>
  <div class="line"><span class="meta">body · 14</span><span class="bd">Two-sided 16pt matte business cards, 500 qty</span></div>
  <div class="line"><span class="meta">caption · 12</span><span class="cap">Updated 4 minutes ago by Dana</span></div>
</body>
</html>
