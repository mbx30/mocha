<!-- @dsCard group="Brand" viewport="700x180" name="Logo & Wordmark" subtitle="The Mint violet flow-mark, light & dark lockups" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); padding: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .pane { display: flex; align-items: center; gap: 16px; padding: 36px 32px; }
  .light { background: var(--neutral-0); }
  .dark { background: var(--neutral-950); }
  .lock { display: flex; align-items: center; gap: 12px; }
  img { width: 42px; height: auto; display: block; }
  .wm { font-size: 26px; font-weight: 700; letter-spacing: var(--tracking-tight); }
  .light .wm { color: var(--neutral-900); }
  .dark .wm { color: #fff; }
  .sub { font-size: 11px; font-weight: 500; letter-spacing: var(--tracking-caps); text-transform: uppercase; margin-top: 2px; }
  .light .sub { color: var(--neutral-500); }
  .dark .sub { color: #76767f; }
</style>
</head>
<body>
  <div class="pane light">
    <div class="lock">
      <img src="../assets/mint-logo.svg" alt="Mint">
      <div><div class="wm">Mint</div><div class="sub">Print Shop OS</div></div>
    </div>
  </div>
  <div class="pane dark">
    <div class="lock">
      <img src="../assets/mint-logo.svg" alt="Mint">
      <div><div class="wm">Mint</div><div class="sub">Print Shop OS</div></div>
    </div>
  </div>
</body>
</html>
