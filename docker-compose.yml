# Stirling PDF sidecar for Mint — general PDF plumbing (merge/split/convert/compress).
# Start: docker compose up -d
# Health: curl http://127.0.0.1:8080/api/v1/info/status
services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: mint-stirling-pdf
    ports:
      - "8080:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      SYSTEM_DEFAULTLOCALE: en-US
    volumes:
      - stirling_data:/usr/share/tessdata
    restart: unless-stopped

volumes:
  stirling_data:
