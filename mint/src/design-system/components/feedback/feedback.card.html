<!-- @dsCard group="Components" viewport="700x340" name="Feedback — Dialog & Toast" subtitle="Confirmation modal and transient toasts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary); font-family:var(--font-sans); padding:22px; }
  .wrap { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
  .group { display:flex; flex-direction:column; gap:10px; }
  .lab { font:var(--font-caption); font-weight:600; text-transform:uppercase; letter-spacing:var(--tracking-caps); color:var(--text-tertiary); }
  /* render dialog inline (not portaled to body overlay) for the specimen */
  .stage { position:relative; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Toast, Card, IconButton } = window.MintDesignSystem_75694f;
  const Tooltip = window.MintDesignSystem_75694f.Tooltip || (({ children }) => children);
  function Demo() {
    return (
      <div className="wrap">
        <div className="group" style={{width:'300px'}}>
          <span className="lab">Toast</span>
          <Toast tone="success" title="Invoice sent" message="INV-2048 emailed to Acme Co." onClose={()=>{}} />
          <Toast tone="warning" title="Art needs approval" message="2 proofs awaiting customer sign-off." onClose={()=>{}} />
          <Toast tone="danger" title="Payment failed" message="Card declined on order #1042." onClose={()=>{}} />
        </div>
        <div className="group" style={{width:'320px'}}>
          <span className="lab">Dialog (static preview)</span>
          <Card padding="lg">
            <div style={{font:'var(--font-title)', marginBottom:'6px'}}>Delete workbook?</div>
            <div style={{font:'var(--font-body)', color:'var(--text-secondary)', marginBottom:'16px'}}>This removes all sheets. This can’t be undone.</div>
            <div style={{display:'flex', gap:'8px', justifyContent:'flex-end'}}>
              <Button variant="secondary">Cancel</Button>
              <Button variant="danger">Delete</Button>
            </div>
          </Card>
          <div style={{marginTop:'16px', display:'flex', alignItems:'center', gap:'10px'}}>
            <span className="lab">Tooltip →</span>
            <Tooltip label="Split quantity"><Button variant="secondary" size="sm">Hover me</Button></Tooltip>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
