<!-- @dsCard group="Colors" viewport="700x150" name="Brand Violet" subtitle="Primary scale anchored on the #863bff logo" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .n { font: var(--font-caption); font-weight: 600; }
  .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const steps = [
      ['50','#f4f0ff','#481690'],['100','#ece3ff','#481690'],['200','#dccdff','#481690'],
      ['300','#c3a9ff','#2c0a5e'],['400','#a578ff','#fff'],['500','#863bff','#fff'],
      ['600','#7a1fff','#fff'],['700','#6913e0','#fff'],['800','#5715b3','#fff'],['900','#481690','#fff']
    ];
    document.getElementById('row').innerHTML = steps.map(([n,c,t])=>
      `<div class="sw" style="background:${c};color:${t}"><span class="n">${n==='500'?'500 ●':n}</span><span class="h">${c}</span></div>`
    ).join('');
  </script>
</body>
</html>
