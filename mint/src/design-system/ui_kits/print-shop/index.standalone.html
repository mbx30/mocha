<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mint — Print Shop</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles.css">

<!-- JS-referenced assets the bundler can't auto-discover -->
<meta name="ext-resource-dependency" content="../../assets/mint-logo.svg" data-resource-id="mintLogoSvg" />

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 2px solid var(--bg-base); }
  ::-webkit-scrollbar-track { background: transparent; }
  .tabular { font-variant-numeric: tabular-nums; }
</style>

<!-- Splash shown while bundle unpacks + JS-disabled fallback -->
<template id="__bundler_thumbnail" data-bg-color="#0d0d10">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <!-- Mint violet lightning mark, simplified -->
    <rect width="120" height="80" fill="#0d0d10"/>
    <!-- Sidebar strip -->
    <rect x="8" y="8" width="22" height="64" rx="4" fill="#17171c"/>
    <!-- Logo circle in sidebar -->
    <circle cx="19" cy="20" r="6" fill="#863bff"/>
    <!-- Nav dots -->
    <rect x="12" y="32" width="14" height="3" rx="1.5" fill="#863bff" opacity="0.9"/>
    <rect x="12" y="39" width="14" height="3" rx="1.5" fill="#3a3a4a" opacity="0.8"/>
    <rect x="12" y="46" width="14" height="3" rx="1.5" fill="#3a3a4a" opacity="0.8"/>
    <rect x="12" y="53" width="14" height="3" rx="1.5" fill="#3a3a4a" opacity="0.8"/>
    <!-- Main content area -->
    <rect x="36" y="8" width="76" height="64" rx="4" fill="#17171c"/>
    <!-- Top bar -->
    <rect x="36" y="8" width="76" height="12" rx="4" fill="#1e1e26"/>
    <!-- KPI cards row -->
    <rect x="40" y="26" width="16" height="12" rx="2" fill="#1e1e26"/>
    <rect x="59" y="26" width="16" height="12" rx="2" fill="#1e1e26"/>
    <rect x="78" y="26" width="16" height="12" rx="2" fill="#1e1e26"/>
    <rect x="97" y="26" width="11" height="12" rx="2" fill="#1e1e26"/>
    <!-- Table card -->
    <rect x="40" y="43" width="68" height="24" rx="2" fill="#1e1e26"/>
    <rect x="43" y="47" width="40" height="2" rx="1" fill="#3a3a4a" opacity="0.7"/>
    <rect x="43" y="52" width="55" height="2" rx="1" fill="#3a3a4a" opacity="0.5"/>
    <rect x="43" y="57" width="48" height="2" rx="1" fill="#3a3a4a" opacity="0.5"/>
    <rect x="43" y="62" width="52" height="2" rx="1" fill="#3a3a4a" opacity="0.5"/>
    <!-- Violet accent dot -->
    <circle cx="104" cy="14" r="2.5" fill="#863bff"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>

<script src="data.js"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="AppShell.standalone.jsx"></script>
<script type="text/babel" src="Welcome.standalone.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Orders.jsx"></script>
<script type="text/babel" src="Production.jsx"></script>
<script type="text/babel" src="JobTicket.jsx"></script>
<script type="text/babel" src="Invoicing.jsx"></script>
<script type="text/babel" src="Estimates.jsx"></script>
<script type="text/babel" src="Clients.jsx"></script>
<script type="text/babel" src="Inventory.jsx"></script>
<script type="text/babel" src="POS.jsx"></script>
<script type="text/babel" src="QuickBooks.jsx"></script>
<script type="text/babel" src="Workbooks.jsx"></script>
<script type="text/babel" src="PDFTools.jsx"></script>

<script type="text/babel" data-presets="react">
  const { useState, useEffect } = React;
  const { Dialog, Button, Input, Select, Checkbox, Toast, ToastViewport } = window.MintDesignSystem_75694f;
  const { Ic } = window.FK;

  function App() {
    const [signedIn, setSignedIn] = useState(false);
    const [view, setView] = useState('dashboard');
    const [order, setOrder] = useState(null);
    const [theme, setTheme] = useState('light');
    const [newOpen, setNewOpen] = useState(false);
    const [toast, setToast] = useState(null);

    useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
    const toggleTheme = () => setTheme((t) => (t === 'dark' ? 'light' : 'dark'));

    const openOrder = (o) => setOrder(o);
    const back = () => setOrder(null);
    const go = (v) => { setOrder(null); setView(v); };
    const fireToast = (t) => { setToast(t); setTimeout(() => setToast(null), 3200); };

    if (!signedIn) return <window.Welcome onEnter={() => setSignedIn(true)} />;

    let screen;
    if (order) {
      screen = <window.JobTicket order={order} onBack={back} />;
    } else {
      switch (view) {
        case 'dashboard':  screen = <window.Dashboard onOpenOrder={openOrder} />; break;
        case 'orders':     screen = <window.Orders onOpenOrder={openOrder} onNewOrder={() => setNewOpen(true)} />; break;
        case 'production': screen = <window.Production onOpenOrder={openOrder} />; break;
        case 'invoices':   screen = <window.Invoicing />; break;
        case 'estimates':  screen = <window.Estimates />; break;
        case 'clients':    screen = <window.Clients />; break;
        case 'inventory':  screen = <window.Inventory />; break;
        case 'pos':        screen = <window.POS />; break;
        case 'qb':         screen = <window.QuickBooks />; break;
        case 'workbooks':  screen = <window.Workbooks />; break;
        case 'pdf':        screen = <window.PDFTools />; break;
        default:           screen = <window.PDFTools />;
      }
    }

    return (
      <window.AppShell view={view} setView={go} theme={theme} toggleTheme={toggleTheme}>
        {screen}
        <Dialog
          open={newOpen}
          onClose={() => setNewOpen(false)}
          title="New order"
          description="Create a job and drop it into the queue."
          footer={<>
            <Button variant="secondary" onClick={() => setNewOpen(false)}>Cancel</Button>
            <Button variant="primary" iconLeft={<Ic n="Plus" size={15} />} onClick={() => {
              setNewOpen(false);
              fireToast({ tone: 'success', title: 'Order created', message: 'Job added to the queue.' });
            }}>Create order</Button>
          </>}
        >
          <div style={{ display: 'flex', flexDirection: 'column', gap: '13px' }}>
            <Input label="Customer" placeholder="Acme Co." />
            <Input label="Job name" placeholder="500 matte business cards" />
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
              <Input label="Quantity" mono placeholder="500" />
              <Select label="Paper stock" options={['16pt Matte', '14pt Gloss', '100lb Uncoated', '13oz Vinyl']} />
            </div>
            <Checkbox label="Rush job (+8% surcharge)" />
          </div>
        </Dialog>
        <ToastViewport placement="bottom-right">
          {toast && <Toast tone={toast.tone} title={toast.title} message={toast.message} onClose={() => setToast(null)} />}
        </ToastViewport>
      </window.AppShell>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
